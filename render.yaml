services:
  - type: web
    name: expense-tracker
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: expense-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: expense-db
    databaseName: expenses
    user: expenseuser
    plan: free