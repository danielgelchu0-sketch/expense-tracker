<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        form { background: #f4f4f4; padding: 1rem; border-radius: 5px; margin-bottom: 2rem; }
        input { padding: 0.5rem; margin: 0.25rem 0; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 0.75rem 1.5rem; cursor: pointer; margin-top: 0.5rem; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>
    <h1>Expense Tracker</h1>
    
    <!-- Add Expense Form -->
    <form action="/add" method="POST">
        <input type="date" name="date" required>
        <input type="text" name="description" placeholder="Description" required>
        <input type="number" name="amount" step="0.01" placeholder="Amount" required>
        <button type="submit">Add Expense</button>
    </form>
    
    <!-- Expenses List -->
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Amount ($)</th>
            </tr>
        </thead>
        <tbody>
            {% for expense in expenses %}
            <tr>
                <td>{{ expense['date'] }}</td>
                <td>{{ expense['description'] }}</td>
                <td>{{ expense['amount'] }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3">No expenses recorded yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
