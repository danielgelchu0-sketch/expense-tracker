<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Expense</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        form { background: #f4f4f4; padding: 1.5rem; border-radius: 5px; }
        input { padding: 0.75rem; margin: 0.5rem 0; width: 100%; box-sizing: border-box; }
        button { padding: 0.75rem 1.5rem; margin-right: 0.5rem; cursor: pointer; }
        .save { background: #28a745; color: white; border: none; }
        .cancel { background: #6c757d; color: white; border: none; text-decoration: none; display: inline-block; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>Edit Expense</h1>
    <form action="/edit/{{ expense['id'] }}" method="POST">
        <label>Date:</label>
        <input type="date" name="date" value="{{ expense['date'] }}" required>
        
        <label>Description:</label>
        <input type="text" name="description" value="{{ expense['description'] }}" required>
        
        <label>Amount:</label>
        <input type="number" name="amount" step="0.01" value="{{ expense['amount'] }}" required>
        
        <button type="submit" class="save">Save Changes</button>
        <a href="/" class="cancel">Cancel</a>
    </form>
</body>
</html>
